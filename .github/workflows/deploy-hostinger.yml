# Build the static site and upload to Hostinger public_html on every push to main.
# Add FTP credentials as GitHub repo secrets (Settings → Secrets and variables → Actions).

name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify build output (assets + fallback CSS)
        run: |
          echo "Contents of out/:"
          ls -la out/
          echo "Root fallback CSS:"
          ls -la out/styles.css 2>/dev/null || true
          echo "Contents of out/_next/static:"
          ls -la out/_next/static/ 2>/dev/null || true
          echo "CSS files:"
          find out -name "*.css" 2>/dev/null | head -20

      - name: Deploy to Hostinger (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          # Target folder on server (no leading slash often works better). Override with FTP_SERVER_DIR secret if needed.
          server-dir: ${{ secrets.FTP_SERVER_DIR || 'public_html' }}
          dangerous-clean-slate: true
