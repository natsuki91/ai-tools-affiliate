# Build and deploy to Hostinger. Uses FTP by default; set deploy method to SFTP if you enable SSH Access.
# FTP secrets: FTP_SERVER, FTP_USERNAME, FTP_PASSWORD. SFTP (when SSH enabled): SFTP_SERVER, SFTP_USERNAME, SFTP_SSH_PRIVATE_KEY.

name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_method:
        description: "Deploy via FTP or SFTP (use SFTP if you enabled SSH Access in hPanel)"
        required: false
        default: "ftp"
        type: choice
        options:
          - ftp
          - sftp

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AFFILIATE_URL_CHATGPT: ${{ secrets.AFFILIATE_URL_CHATGPT }}
      AFFILIATE_URL_CLAUDE: ${{ secrets.AFFILIATE_URL_CLAUDE }}
      AFFILIATE_URL_JASPER: ${{ secrets.AFFILIATE_URL_JASPER }}
      AFFILIATE_URL_COPY_AI: ${{ secrets.AFFILIATE_URL_COPY_AI }}
      AFFILIATE_URL_WRITESONIC: ${{ secrets.AFFILIATE_URL_WRITESONIC }}
      AFFILIATE_URL_GRAMMARLY: ${{ secrets.AFFILIATE_URL_GRAMMARLY }}
      AFFILIATE_URL_NOTION: ${{ secrets.AFFILIATE_URL_NOTION }}
      AFFILIATE_URL_HOSTINGER: ${{ secrets.AFFILIATE_URL_HOSTINGER }}
      AFFILIATE_URL_SHOPIFY: ${{ secrets.AFFILIATE_URL_SHOPIFY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify build output
        run: |
          echo "Contents of out/:"
          ls -la out/
          test -f out/index.html && echo "index.html OK" || exit 1
          test -d out/_next && echo "_next OK" || exit 1
          test -f out/.htaccess && echo ".htaccess OK" || exit 1
          du -sh out out/_next
          test -f out/robots.txt && echo "robots.txt OK" || exit 1
          test -f out/sitemap.xml && echo "sitemap.xml OK" || exit 1

      - name: Set deploy method
        id: method
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "method=${{ github.event.inputs.deploy_method }}" >> $GITHUB_OUTPUT
          else
            echo "method=${{ vars.DEPLOY_METHOD || 'ftp' }}" >> $GITHUB_OUTPUT
          fi
          echo "Deploy method: $(cat $GITHUB_OUTPUT | grep method | cut -d= -f2)"

      - name: Deploy to Hostinger (FTP port 21)
        if: steps.method.outputs.method != 'sftp'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          # Use ./ so files land in current dir (your FTP often starts in public_html). Set FTP_SERVER_DIR to public_html/ only if your FTP starts in account root.
          server-dir: ${{ secrets.FTP_SERVER_DIR || './' }}
          dangerous-clean-slate: true
          # Default 30s is too low for _next/ + hundreds of HTML files; incomplete uploads cause 404 on /_next/* and broken styling.
          timeout: 900000

      - name: Deploy to Hostinger (SFTP — use when SSH Access is enabled)
        if: steps.method.outputs.method == 'sftp'
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.SFTP_SERVER }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          ssh_private_key: ${{ secrets.SFTP_SSH_PRIVATE_KEY }}
          port: ${{ secrets.SFTP_PORT || '65002' }}
          local_path: "out/"
          remote_path: ${{ secrets.SFTP_REMOTE_PATH || 'public_html/' }}
          sftp_only: true

      - name: Verify live site (_next, sitemap, clean URLs)
        if: success()
        run: |
          set -e
          SITE="${VERIFY_LIVE_URL:-https://toolscout.tools}"
          echo "Waiting 25s for host to serve new files..."
          sleep 25
          echo "Checking $SITE ..."
          for path in robots.txt sitemap.xml styles.css; do
            code=$(curl -sS -o /dev/null -w "%{http_code}" "$SITE/$path")
            echo "$path -> HTTP $code"
            test "$code" = "200" || { echo "FAIL: expected 200 for /$path"; exit 1; }
          done
          CSS_PATH=$(grep -oE '_next/static/css/[^"]+' out/index.html | head -1)
          if [ -z "$CSS_PATH" ]; then echo "FAIL: no _next CSS in index.html"; exit 1; fi
          code=$(curl -sS -o /dev/null -w "%{http_code}" "$SITE/$CSS_PATH")
          echo "$CSS_PATH -> HTTP $code"
          test "$code" = "200" || { echo "FAIL: _next assets missing on server (FTP timeout or wrong directory?)"; exit 1; }
          code=$(curl -sS -o /dev/null -w "%{http_code}" "$SITE/ai-tools")
          echo "/ai-tools -> HTTP $code"
          test "$code" = "200" || { echo "FAIL: clean URL /ai-tools (needs mod_rewrite + .htaccess on Hostinger)"; exit 1; }
