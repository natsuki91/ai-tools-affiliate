# Build the static site and upload to Hostinger via FTP on port 21 (push to main).
# Secrets: FTP_SERVER, FTP_USERNAME, FTP_PASSWORD. Optional: FTP_SERVER_DIR (default public_html/).

name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AFFILIATE_URL_CHATGPT: ${{ secrets.AFFILIATE_URL_CHATGPT }}
      AFFILIATE_URL_CLAUDE: ${{ secrets.AFFILIATE_URL_CLAUDE }}
      AFFILIATE_URL_JASPER: ${{ secrets.AFFILIATE_URL_JASPER }}
      AFFILIATE_URL_COPY_AI: ${{ secrets.AFFILIATE_URL_COPY_AI }}
      AFFILIATE_URL_WRITESONIC: ${{ secrets.AFFILIATE_URL_WRITESONIC }}
      AFFILIATE_URL_GRAMMARLY: ${{ secrets.AFFILIATE_URL_GRAMMARLY }}
      AFFILIATE_URL_NOTION: ${{ secrets.AFFILIATE_URL_NOTION }}
      AFFILIATE_URL_HOSTINGER: ${{ secrets.AFFILIATE_URL_HOSTINGER }}
      AFFILIATE_URL_SHOPIFY: ${{ secrets.AFFILIATE_URL_SHOPIFY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify build output
        run: |
          echo "Contents of out/:"
          ls -la out/
          test -f out/index.html && echo "index.html OK" || exit 1
          test -d out/_next && echo "_next OK" || exit 1
          test -f out/.htaccess && echo ".htaccess OK" || exit 1

      - name: Deploy to Hostinger (FTP port 21)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: ${{ secrets.FTP_SERVER_DIR || 'public_html/' }}
          dangerous-clean-slate: true
