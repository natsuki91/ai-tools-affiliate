# Build the static site and upload to Hostinger public_html on every push to main.
# Add FTP credentials as GitHub repo secrets (Settings → Secrets and variables → Actions).

name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # Optional: add these as repo secrets to use your affiliate links in the built site
      AFFILIATE_URL_CHATGPT: ${{ secrets.AFFILIATE_URL_CHATGPT }}
      AFFILIATE_URL_CLAUDE: ${{ secrets.AFFILIATE_URL_CLAUDE }}
      AFFILIATE_URL_JASPER: ${{ secrets.AFFILIATE_URL_JASPER }}
      AFFILIATE_URL_COPY_AI: ${{ secrets.AFFILIATE_URL_COPY_AI }}
      AFFILIATE_URL_WRITESONIC: ${{ secrets.AFFILIATE_URL_WRITESONIC }}
      AFFILIATE_URL_GRAMMARLY: ${{ secrets.AFFILIATE_URL_GRAMMARLY }}
      AFFILIATE_URL_NOTION: ${{ secrets.AFFILIATE_URL_NOTION }}
      AFFILIATE_URL_HOSTINGER: ${{ secrets.AFFILIATE_URL_HOSTINGER }}
      AFFILIATE_URL_SHOPIFY: ${{ secrets.AFFILIATE_URL_SHOPIFY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify build output (assets + fallback CSS)
        run: |
          echo "Contents of out/:"
          ls -la out/
          echo "Root fallback CSS:"
          ls -la out/styles.css 2>/dev/null || true
          echo "Contents of out/_next/static:"
          ls -la out/_next/static/ 2>/dev/null || true
          echo "CSS files:"
          find out -name "*.css" 2>/dev/null | head -20

      - name: Deploy to Hostinger (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          # Upload into web root. Default: public_html/ (Hostinger). Override with repo secret FTP_SERVER_DIR if your path differs.
          server-dir: ${{ secrets.FTP_SERVER_DIR || 'public_html/' }}
          dangerous-clean-slate: true
